#需要翻墙下载 就需要在本地下载好 在Copy到远端Docker->images里
#正式服部署 Ubuntu 22.04
services:  # 定义所有需要运行的服务
  redis:  # redis 服务
    image: redis:8.6.2  # 使用最新的 redis 镜像
    platform: linux/amd64  # 明确指定镜像架构为 x86_64
    container_name: redis_10000  # 容器名称，方便管理
    ports:
      - "10000:6379"  # 将主机63791端口映射到容器6379端口
    volumes:
      - ./beans_data/redis_data:/data  # 挂载主机目录到容器，实现数据持久化
    command: redis-server --port 6379 --save 900 1 --save 300 10 --save 60 10000  # 启动 redis 并设置持久化策略
    restart: unless-stopped  # 容器异常退出时自动重启，除非手动停止
    networks:
      - beans_network  # 连接到 cash_network 网络，便于与其他服务通信

  # PostgreSQL 数据库服务（自定义名称，可随意改）
  postgres:
    # 镜像版本：固定 PostgreSQL 18（修复报错的核心版本，不升级不降级）
    image: postgres:18
    # 容器名称（方便管理，固定不变）
    container_name: postgres_10001
    # 重启策略：always = 电脑开机/容器崩溃时自动重启（生产环境必备）
    restart: always
    # 端口映射：宿主机端口:容器内部端口
    # 左边 5432 = 你电脑/外部连接用的端口（可修改，比如 5433）
    # 右边 5432 = PostgreSQL 默认端口（固定不能改）
    ports:
      - "10001:5432"
    # 核心环境变量（数据库初始化配置，无需重装自动生效）
    environment:
      # 数据库超级管理员密码（你原来的密码，保留不变）
      POSTGRES_PASSWORD: 12345678
      # 数据库默认用户名（默认 postgres，固定即可）
      POSTGRES_USER: postgres
      # 初始化自动创建的数据库名（你原来的库名，保留不变）
      #POSTGRES_DB: game_db
      # 时区设置：亚洲/上海（解决时间错乱问题）
      TZ: Asia/Shanghai
    # 🔥 核心修复：PostgreSQL 18+ 必须挂载上层目录（数据完全保留，不丢失）
    # 旧写法（报错）：./postgres/data:/var/lib/postgresql/data
    # 新写法（兼容+安全）：本地 postgres 文件夹 → 容器 /var/lib/postgresql
    volumes:
      - ./beans_data/postgres:/var/lib/postgresql
    # 独立网络（隔离容器，避免端口冲突）
    networks:
      - beans_network
networks:
  beans_network:
    driver: bridge
